name: Create PR from Tag

on:
  push:
    tags:
      - 'v*'  # Triggers when a tag starting with 'v' is pushed

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Tag Name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # This creates a unique temporary branch from your tag and pushes it to GitHub
      - name: Create and Push Temp Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b pr-branch-${{ env.TAG_NAME }}
          git push origin pr-branch-${{ env.TAG_NAME }} --force

      # Uses GitHub's official command line utility to force open the PR
      - name: Create Pull Request via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Automated PR for Tag ${{ env.TAG_NAME }}" \
            --body "This automated Pull Request was created because the tag ${{ env.TAG_NAME }} was pushed." \
            --head "pr-branch-${{ env.TAG_NAME }}" \
            --base "main"
