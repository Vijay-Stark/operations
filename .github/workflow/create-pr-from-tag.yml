name: Create PR from Tag

on:
  push:
    tags:
      - 'v*'  # Triggers the workflow whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for the tag to be analyzed

      - name: Extract Tag Name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "pr-for-${{ env.TAG_NAME }}"
          base: "main"  # Replace with the branch you want to merge into
          title: "Automated PR for Tag ${{ env.TAG_NAME }}"
          body: |
            ## Description
            This automated Pull Request was created because the tag **${{ env.TAG_NAME }}** was pushed.
            Please review the changes associated with this release.
          labels: "release, automated"
          draft: false
